name: book-keeper-prod

services:
    app:
        build:
            context: .
            dockerfile: docker/prod/Dockerfile
        ports:
            - '8081:80'
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            APP_URL: 'https://${PROD_DOMAIN:-taqsimot.fannjourney.com}'
            DB_CONNECTION: sqlite
            DB_DATABASE: /var/www/html/database/database.sqlite
        env_file:
            - .env
        volumes:
            - prod-storage:/var/www/html/storage
            - ./database/database.sqlite:/var/www/html/database/database.sqlite
        networks:
            - prod

    queue:
        build:
            context: .
            dockerfile: docker/prod/Dockerfile
        command: php artisan queue:work --verbose --tries=3 --timeout=600
        depends_on:
            - app
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            APP_URL: 'https://${PROD_DOMAIN:-taqsimot.fannjourney.com}'
            DB_CONNECTION: sqlite
            DB_DATABASE: /var/www/html/database/database.sqlite
        env_file:
            - .env
        volumes:
            - prod-storage:/var/www/html/storage
            - ./database/database.sqlite:/var/www/html/database/database.sqlite
        networks:
            - prod


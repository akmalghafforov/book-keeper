name: book-keeper-prod

services:
    app:
        build:
            context: .
            dockerfile: docker/prod/Dockerfile
        expose:
            - '80'
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            APP_URL: 'https://${PROD_DOMAIN:-taqsimot.test}'
            DB_CONNECTION: sqlite
            DB_DATABASE: /var/www/html/storage/app-db/database.sqlite
        env_file:
            - .env
        volumes:
            - prod-storage:/var/www/html/storage
        networks:
            - prod

    proxy:
        build:
            context: .
            dockerfile: docker/prod/proxy.Dockerfile
        depends_on:
            - app
        ports:
            - '${PROD_HTTP_PORT:-80}:80'
            - '${PROD_HTTPS_PORT:-443}:443'
        environment:
            PROD_DOMAIN: '${PROD_DOMAIN:-taqsimot.test}'
        volumes:
            - prod-certs:/etc/nginx/certs
        networks:
            - prod

volumes:
    prod-storage:
    prod-certs:

networks:
    prod:
        driver: bridge

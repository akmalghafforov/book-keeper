server {
    listen 80;
    server_name taqsimot.fannjourney.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name taqsimot.fannjourney.com;
    root /home/akmal/Projects/book-keeper/public;

    auth_basic "Restricted Access";
    auth_basic_user_file /home/akmal/Projects/book-keeper/.htpasswd;

    index index.php;

    charset utf-8;

    # Using the existing certificates from fannhiking to enable SSL routing.
    # Nginx will use SNI to route taqsimot.fannjourney.com here correctly.
    ssl_certificate /home/akmal/Projects/fannhiking/docker/ssl/certs/localhost.crt;
    ssl_certificate_key /home/akmal/Projects/fannhiking/docker/ssl/certs/localhost.key;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
